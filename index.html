<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinit Rai | Cloud Computing Portfolio</title>

    <!-- SEO & Meta -->
    <meta name="description"
        content="Portfolio of Vinit Rai, a passionate B.Tech Cloud Computing student focused on AWS, Azure, GCP, and full-stack DevOps architecture.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <!-- AOS Animation -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <!-- Tailwind CSS with custom configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cloud: {
                            900: '#030712', // Darker, cleaner deep slate background (modern cloud style)
                            800: '#111827', // Lighter slate
                            neon: '#06b6d4', // Vibrant Cyan (Tailwind Cyan-500)
                            glow: '#3b82f6'  // Electric Blue (Tailwind Blue-500)
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'type': 'type 3s ease-out .8s infinite alternate both',
                        'spin-slow': 'spin 15s linear infinite',
                        'bounce-slow': 'bounce 3s infinite',
                        'blob': 'blob 10s infinite'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' }
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="selection:bg-cloud-neon selection:text-white bg-cloud-900 text-white overflow-x-hidden min-h-screen relative">

    <!-- Aurora Mesh / Cloud Gradient Background Elements -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-cloud-neon/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob"></div>
        <div class="absolute top-0 right-1/4 w-96 h-96 bg-cloud-glow/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-purple-500/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-4000"></div>
    </div>

    <!-- Custom Cursor Elements -->
    <div class="cursor-dot hidden md:block z-[9999]"></div>
    <div class="cursor-outline hidden md:block z-[9998]"></div>

    <!-- Container for dynamic component injection -->
    <div id="app" class="relative z-10"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        // Script loader to simulate a component-based frontend (like React/Next, but vanilla JS)
        // Similar architecture to aksh00001.github.io reference

        async function loadComponents() {
            const app = document.getElementById('app');
            const components = [
                'sections/navbar.html',
                'sections/hero.html',
                'sections/about.html',
                'sections/skills.html',
                'sections/projects.html',
                'sections/achievements.html',
                'sections/education.html',
                'sections/certifications.html',
                'sections/contact.html'
            ];

            // Wait for all HTML fetch promises to resolve
            const htmlContents = await Promise.all(
                components.map(async file => {
                    const response = await fetch(file);
                    return await response.text();
                })
            );

            // Append all HTML into DOM synchronously to prevent layout leaps
            app.innerHTML = htmlContents.join('');

            // Now inject the main custom scripts after DOM is built
            const script = document.createElement('script');
            script.src = 'js/script.js';
            document.body.appendChild(script);
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', loadComponents);
    </script>
</body>

</html>
