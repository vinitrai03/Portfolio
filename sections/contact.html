<!-- 8. Contact -->
<section id="contact" class="py-24 bg-cloud-800/30 relative z-10 border-t border-white/5">
    <div class="max-w-4xl mx-auto px-6">
        <div class="text-center mb-16" data-aos="fade-up">
            <span class="text-cloud-neon font-mono text-sm tracking-widest uppercase">Get In Touch</span>
            <h2 class="text-4xl md:text-5xl font-bold mt-2">Deploy A <span class="text-cloud-neon">Message</span></h2>
        </div>

        <div class="glass-card rounded-3xl p-8 md:p-12 relative overflow-hidden" data-aos="fade-up" data-aos-delay="200">
            <!-- Decorative background elements inside form -->
            <div class="absolute top-[-50px] right-[-50px] w-32 h-32 bg-cloud-neon/20 rounded-full blur-3xl"></div>
            <div class="absolute bottom-[-50px] left-[-50px] w-32 h-32 bg-blue-600/20 rounded-full blur-3xl"></div>

            <form id="contact-form" class="relative z-10 flex flex-col gap-6" onsubmit="submitForm(event);">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label for="name" class="text-sm font-semibold text-gray-300 ml-1">Name</label>
                        <input type="text" name="name" id="name" required class="bg-cloud-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cloud-neon focus:ring-1 focus:ring-cloud-neon transition-all" placeholder="John Doe">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label for="email" class="text-sm font-semibold text-gray-300 ml-1">Email</label>
                        <input type="email" name="email" id="email" required class="bg-cloud-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cloud-neon focus:ring-1 focus:ring-cloud-neon transition-all" placeholder="john@company.com">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <label for="message" class="text-sm font-semibold text-gray-300 ml-1">Message</label>
                    <textarea name="message" id="message" rows="5" required class="bg-cloud-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cloud-neon focus:ring-1 focus:ring-cloud-neon transition-all resize-none" placeholder="Let's build something scalable..."></textarea>
                </div>
                <button type="submit" id="submit-btn" class="mt-2 bg-cloud-neon text-cloud-900 font-bold text-lg py-4 rounded-xl hover:bg-white hover:shadow-[0_0_20px_#00f2fe] transition-all flex items-center justify-center gap-2">
                    <span>Send Transmission</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
                <div id="form-success" class="hidden text-green-400 text-center text-sm font-mono mt-2">Message sent successfully via Formspree!</div>
                <div id="form-error" class="hidden text-red-500 text-center text-sm font-mono mt-2">Please configure your Formspree ID.</div>
            </form>
        </div>
        
        <!-- Socials -->
